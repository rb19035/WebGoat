name: synk.yml
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    security:
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        steps:
            - uses: actions/checkout@master
            - name: Run Snyk to check for vulnerabilities
              uses: snyk/actions/maven-3-jdk-21@master
              continue-on-error: true # To make sure that SARIF upload gets called
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --sarif-file-output=/sarif/snyk-${{ github.run_number }}.sarif
            - name: Upload result to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: snyk-${{ github.run_number }}.sarif
            - name: Archive code coverage results
              uses: actions/upload-artifact@v4
              with:
                  name: snyk.sarif
                  path: /sarif/snyk-${{ github.run_number }}.sarif
                  retention-days: 5

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                   aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                   aws-region: us-east-1

            - name: Upload files to S3
              uses: jakejarvis/s3-sync-action@v0.5.1
              with:
                   args: # Optional
                   env: # Optional
                   AWS_S3_BUCKET: ${{ secrets.AWS_S3_DOJO_BUCKET }}
                   SOURCE_DIR: '/sarif'
